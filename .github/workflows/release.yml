name: Release

on:
  push:
    tags:
      - "*"

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION)
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$CARGO_VERSION" ] || [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: VERSION=$FILE_VERSION Cargo.toml=$CARGO_VERSION tag=$TAG_VERSION"
            exit 1
          fi
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  benchmark:
    name: Release Benchmarks
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: BENCH_SAMPLES=10 ./scripts/bench-history.sh
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: |
            bench-history.csv
            BENCHMARKS.md

  release:
    name: GitHub Release
    needs: [publish, benchmark]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: benchmarks
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bench-history.csv
            BENCHMARKS.md
